name: CI and VPS deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cards-against-jewels-production
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  HEALTH_URL: ${{ secrets.HEALTH_URL }}

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace @cards-against-jewels/server

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test-build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH || '/opt/cards-against-jewels' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          REPO_URL: ${{ secrets.REPO_URL }}
          HEALTH_URL: ${{ env.HEALTH_URL }}
        run: |
          set -euo pipefail
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$VPS_PATH' REPO_URL='$REPO_URL' RELEASE_REF='$GITHUB_SHA' HEALTH_URL='$HEALTH_URL' bash -s" \
            < scripts/deploy/remote-compose-deploy.sh
