name: CI and VPS deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cards-against-jewels-production
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  HEALTH_URL: ${{ secrets.HEALTH_URL }}

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace @cards-against-jewels/server

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test-build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production images
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_DISCORD_CLIENT_ID: ${{ secrets.VITE_DISCORD_CLIENT_ID }}
        run: |
          set -euo pipefail
          docker build \
            --target server \
            -t "cards-against-jewels-server:${GITHUB_SHA}" \
            .
          docker build \
            --target web \
            --build-arg "VITE_SERVER_URL=${VITE_SERVER_URL}" \
            --build-arg "VITE_DISCORD_CLIENT_ID=${VITE_DISCORD_CLIENT_ID:-}" \
            -t "cards-against-jewels-web:${GITHUB_SHA}" \
            .

      - name: Export images
        run: |
          set -euo pipefail
          docker save \
            "cards-against-jewels-server:${GITHUB_SHA}" \
            "cards-against-jewels-web:${GITHUB_SHA}" \
            | gzip > images.tar.gz

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 20 -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            echo "ssh-keyscan failed on attempt ${attempt}; retrying in 10 seconds..."
            sleep 10
          done
          echo "ssh-keyscan failed after 5 attempts"
          exit 1

      - name: Upload images
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH || '/opt/cards-against-jewels' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          set -euo pipefail
          ssh -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_PATH/uploads'"
          scp -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -P "$VPS_PORT" images.tar.gz "$VPS_USER@$VPS_HOST:$VPS_PATH/uploads/${GITHUB_SHA}.images.tar.gz"

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH || '/opt/cards-against-jewels' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          REPO_URL: ${{ secrets.REPO_URL }}
          HEALTH_URL: ${{ env.HEALTH_URL }}
        run: |
          set -euo pipefail
          ssh -o ConnectTimeout=30 -o ConnectionAttempts=5 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$VPS_PATH' REPO_URL='$REPO_URL' RELEASE_REF='$GITHUB_SHA' HEALTH_URL='$HEALTH_URL' IMAGE_ARCHIVE='$VPS_PATH/uploads/${GITHUB_SHA}.images.tar.gz' bash -s" \
            < scripts/deploy/remote-compose-deploy.sh
