services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: caj
      POSTGRES_USER: caj
      POSTGRES_PASSWORD: caj_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  server:
    build:
      context: .
      target: server
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - apps/server/.env
    ports:
      - "127.0.0.1:3333:3333"

  web:
    build:
      context: .
      target: web
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://localhost:3333}
        VITE_DISCORD_CLIENT_ID: ${VITE_DISCORD_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "8080:80"

volumes:
  postgres-data:
